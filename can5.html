<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <canvas width="900" height="400" style="border: 1px solid black"></canvas>
    <script>
      let ctx = document.querySelector("canvas").getContext("2d");

      ctx.strokeStyle = "lightgray";
      ctx.lineWidth = 0.5;

      for (i = 1; i <= 7; i++) {
        ctx.beginPath();
        ctx.moveTo(50, i * 50);
        ctx.lineTo(850, i * 50);
        ctx.stroke();
      }

      ctx.strokeStyle = "lightskyblue";
      ctx.lineWidth = 40;

      for (j = 1; j <= 15; j++) {
        ctx.beginPath();
        ctx.moveTo(55 * j, 400);
        ctx.lineTo(55 * j, 100);
        ctx.stroke();
      }
    </script>
  </body>
</html>
