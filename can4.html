<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <canvas width="600" height="400" style="border: 1px solid red"></canvas>
    <script>
      let ctx = document.querySelector("canvas").getContext("2d");
      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.moveTo(10 * 10, 10 * 10);
      ctx.lineTo(30 * 10, 20 * 10);
      ctx.lineTo(10 * 10, 20 * 10);
      ctx.lineTo(10 * 10, 10 * 10);
      ctx.fill();
    </script>
  </body>
</html>
